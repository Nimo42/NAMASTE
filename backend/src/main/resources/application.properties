spring.application.name=namaste

server.port=${PORT:8080}
server.servlet.context-path=/

# Database — H2 file-based (persistent, stored in ./data/namastedb)
spring.datasource.url=jdbc:h2:file:./data/namastedb;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Seed data handled by CommandLineRunner, not data.sql
spring.sql.init.mode=never

# H2 Console (browse DB at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ML Service
ml.service.url=${ML_SERVICE_URL:http://localhost:5000/predict}

# JWT
jwt.secret=${JWT_SECRET:namaste-jwt-secret-key-change-in-production-at-least-32chars}
jwt.expiration=${JWT_EXPIRATION:604800000}

# Mail (optional)
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USER:}
spring.mail.password=${SMTP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Google OAuth
google.client.id=${GOOGLE_CLIENT_ID:}
google.client.secret=${GOOGLE_CLIENT_SECRET:}

# Client
client.origin=${CLIENT_ORIGIN:http://localhost:3000}